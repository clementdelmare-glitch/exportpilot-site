<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fond ExportPilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
    }

    .bg {
      width: 1200px;
      height: 1200px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #EFF6FF 0%, #DBEAFE 50%, #EFF6FF 100%);
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.06);
    }
    .circle-1 { width: 200px; height: 200px; top: -60px; right: -40px; }
    .circle-2 { width: 140px; height: 140px; bottom: 80px; left: 40px; }
    .circle-3 { width: 100px; height: 100px; top: 45%; right: 8%; }
    .circle-4 { width: 80px; height: 80px; top: 15%; left: 12%; }
    .circle-5 { width: 60px; height: 60px; bottom: 25%; right: 25%; }
  </style>
</head>
<body>
<div class="bg">
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>
  <div class="circle circle-4"></div>
  <div class="circle circle-5"></div>
</div>
</body>
</html>
